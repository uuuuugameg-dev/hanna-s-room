<!DOCTYPE html>

<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>日記 — はんなの部屋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=Zen+Kaku+Gothic+New:wght@300;400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --blue-glow: #2a4a6b;
      --text-bright: #ffffff;
      --text-main: #cddce8;
      --text-sub: #8ab0cc;
      --text-muted: #4a7a9a;
      --accent: #6baed6;
      --tag-diary-bg: rgba(107, 174, 214, 0.08);
      --tag-diary-border: rgba(107, 174, 214, 0.25);
      --font-serif: 'Shippori Mincho', serif;
      --font-sans: 'Zen Kaku Gothic New', sans-serif;
      --font-en: 'DM Serif Display', serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; color-scheme: only dark; }
    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.9;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 20%, rgba(30, 60, 95, 0.45) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 85% 70%, rgba(20, 45, 70, 0.35) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(107, 174, 214, 0.4) 30%, transparent 100%);
      z-index: 1;
    }
    .container {
      max-width: 660px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 2;
    }
    nav {
      padding: 24px 0 0;
      display: flex;
      gap: 24px;
      align-items: center;
    }
    nav a {
      font-family: var(--font-en);
      font-size: 0.78rem;
      color: var(--text-muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.25s;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
    }
    nav a:hover { color: var(--accent); border-bottom-color: rgba(107, 174, 214, 0.4); }
    nav a.active { color: var(--accent); border-bottom-color: rgba(107, 174, 214, 0.4); }
    nav .nav-title {
      font-family: var(--font-serif);
      font-size: 0.9rem;
      color: var(--text-sub);
      margin-right: auto;
      text-decoration: none;
      border-bottom: none !important;
    }
    .page-header {
      padding: 48px 0 36px;
      animation: fadeUp 1s ease both;
    }
    .page-title {
      font-family: var(--font-serif);
      font-size: clamp(1.3rem, 4vw, 1.7rem);
      font-weight: 600;
      color: var(--text-bright);
      letter-spacing: 0.1em;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--blue-glow) 0%, transparent 80%);
      margin: 32px 0;
      opacity: 0.6;
    }
    .posts { animation: fadeUp 1s 0.15s ease both; }
    .post { margin-bottom: 56px; }
    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .post-date {
      font-family: var(--font-en);
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
    }
    .post-tag {
      font-size: 0.68rem;
      padding: 2px 10px;
      border-radius: 2px;
      letter-spacing: 0.08em;
      background: var(--tag-diary-bg);
      border: 1px solid var(--tag-diary-border);
      color: var(--accent);
    }
    .post-title {
      font-family: var(--font-serif);
      font-size: clamp(1.05rem, 3vw, 1.2rem);
      font-weight: 500;
      color: var(--text-bright);
      letter-spacing: 0.06em;
      line-height: 1.65;
      margin-bottom: 14px;
    }
    .post-body {
      font-size: 0.85rem;
      color: var(--text-main);
      line-height: 2.15;
      letter-spacing: 0.04em;
    }
    .post-body p + p { margin-top: 14px; }
    footer {
      padding: 36px 0 56px;
    }
    .footer-text {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      font-family: var(--font-en);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--blue-glow); border-radius: 2px; }
  </style>
</head>
